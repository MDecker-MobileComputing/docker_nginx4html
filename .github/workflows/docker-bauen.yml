name: Docker-Container bauen

on:
  workflow_dispatch:

jobs:
  docker-container-bauen:
    name: Docker-Container bauen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        run: |
          ZEITSTEMPEL=$(date -u +"%Y-%m-%d_%H-%M")
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=ghcr.io/${OWNER}/nginx-mit-custom-html:${ZEITSTEMPEL}" >> $GITHUB_ENV
          echo "IMAGE_TAG_LATEST=ghcr.io/${OWNER}/nginx-mit-custom-html:latest" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_TAG_LATEST }}

# Webseite mit gepushten Docker-Image:
# https://github.com/MDecker-MobileComputing/docker_nginx4html/pkgs/container/nginx-mit-custom-html/
